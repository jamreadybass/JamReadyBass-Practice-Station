<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PocketLocker — Highway (visual mockup)</title>
<style>
  :root{
    --void:#0a0b0f; --amber:#ffb020; --ember:#ff5a3d; --lock:#46d39a;
    --bone:#ece6d6; --ash:#5b6270; --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--void);color:var(--bone);font-family:var(--sans);overflow:hidden;height:100%}
  #wrap{max-width:760px;margin:0 auto;height:100vh;display:flex;flex-direction:column}
  header{padding:14px 18px 8px;display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  h1{font-size:13px;letter-spacing:.34em;text-transform:uppercase;font-weight:800;margin:0;color:var(--amber)}
  .tag{font-family:var(--mono);font-size:10px;color:var(--ash);letter-spacing:.12em;text-transform:uppercase}
  #stage{position:relative;flex:1;min-height:0}
  canvas{display:block;width:100%;height:100%;touch-action:none}
  .hud{position:absolute;top:12px;right:18px;display:flex;gap:22px;pointer-events:none;font-family:var(--mono);text-align:right}
  .hud div span{font-size:10px;color:var(--ash);letter-spacing:.1em;text-transform:uppercase;display:block}
  .hud div b{font-size:26px;font-weight:800;line-height:1.1}
  footer{padding:8px 18px 14px;display:flex;align-items:center;gap:14px}
  .ctrl{display:flex;flex-direction:column;gap:4px;flex:1}
  .ctrl label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ash);font-family:var(--mono)}
  .ctrl .v{font-family:var(--mono);color:var(--amber);font-size:12px}
  input[type=range]{width:100%;accent-color:var(--amber)}
  .note{font-family:var(--mono);font-size:11px;color:var(--ash);line-height:1.5;padding:0 18px 14px}
  .note b{color:var(--bone)}
</style>
</head>
<body>
<div id="wrap">
  <header><h1>PocketLocker</h1><span class="tag">highway · visual mockup</span></header>
  <div id="stage">
    <canvas id="hw"></canvas>
    <div class="hud">
      <div><span>streak</span><b id="combo" style="color:var(--bone)">0</b></div>
      <div><span>last</span><b id="last" style="color:var(--ash)">—</b></div>
    </div>
  </div>
  <footer><div class="ctrl"><label>Tempo <span class="v" id="bpmV">96</span> bpm</label><input type="range" id="bpm" min="60" max="160" value="96"></div></footer>
  <div class="note"><b>Read the staff up top</b> as notes roll in from the right; the gems below lock into <b>the pocket</b> (the amber line) on the beat. Auto-plays so you can watch — <b>tap the highway</b> to lock notes yourself. Not wired to the mic yet; this is the look to react to.</div>
</div>
<script>
"use strict";
const cv=document.getElementById('hw'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
let pocketX=0, staffY=0, hwMid=0, notTop=0, notBot=0, hwTop=0, hwBot=0;
function size(){DPR=Math.min(window.devicePixelRatio||1,2);const r=cv.getBoundingClientRect();
  W=Math.round(r.width*DPR);H=Math.round(r.height*DPR);cv.width=W;cv.height=H;
  pocketX=W*0.30; notTop=H*0.06; staffY=H*0.21; notBot=H*0.34; hwTop=H*0.40; hwMid=H*0.66; hwBot=H*0.96;}
window.addEventListener('resize',size);

let bpm=96;
document.getElementById('bpm').oninput=e=>{bpm=+e.target.value;document.getElementById('bpmV').textContent=bpm;};

const PATTERN=[
  {b:0,d:1},{b:1,d:.5},{b:1.5,d:.5},{b:2,d:2},
  {b:4,d:.25},{b:4.25,d:.25},{b:4.5,d:.25},{b:4.75,d:.25},{b:5,d:1},{b:6,d:.5},{b:6.5,d:.5},{b:7,d:1}
];
const LOOP_BEATS=8, LOOKAHEAD=2.6;
const hits=new Map();
let combo=0, lastRating={txt:'—',col:'#5b6270',t:0}, bursts=[], t0=performance.now()/1000;

function rng(s){let x=Math.sin(s*99.13)*43758.5;return x-Math.floor(x);}
function ratingFor(a){
  if(a<=0.028)return{txt:'LOCKED',col:'#46d39a'}; if(a<=0.055)return{txt:'TIGHT',col:'#7ad39a'};
  if(a<=0.090)return{txt:'GOOD',col:'#ffb020'}; if(a<=0.140)return{txt:'LOOSE',col:'#ff8a3d'};
  return{txt:'OFF',col:'#ff5a3d'};
}
function notesIn(now,beatDur){
  const loopDur=LOOP_BEATS*beatDur, k=Math.floor(now/loopDur), out=[];
  for(let loop=k-1;loop<=k+1;loop++) for(const p of PATTERN){
    out.push({time:loop*loopDur+p.b*beatDur, dur:p.d*beatDur, id:loop*100+p.b, beat:p.b});
  }
  return out.sort((a,b)=>a.time-b.time);
}
function tapHit(now,beatDur){
  const ns=notesIn(now,beatDur); let best=null,bd=1e9;
  for(const n of ns){if(hits.has(n.id))continue;const d=Math.abs(n.time-now);if(d<bd){bd=d;best=n;}}
  if(best&&bd<0.3){const err=now-best.time,r=ratingFor(Math.abs(err));
    hits.set(best.id,{err,t:performance.now()});combo=Math.abs(err)<0.14?combo+1:0;
    lastRating={txt:r.txt,col:r.col,t:performance.now()};bursts.push({x:pocketX,y:hwMid,t:performance.now(),col:r.col});}
}
cv.addEventListener('pointerdown',()=>tapHit(performance.now()/1000-t0,60/bpm));

function rrect(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function hex2rgb(h){h=h.replace('#','');const n=parseInt(h.length===3?h.split('').map(c=>c+c).join(''):h,16);return `${(n>>16)&255},${(n>>8)&255},${n&255}`;}

function frame(){
  const now=performance.now()/1000-t0, nowMs=performance.now(), beatDur=60/bpm;
  const SPEED=(W-pocketX-18*DPR)/LOOKAHEAD;
  ctx.clearRect(0,0,W,H);
  // bg
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#0a0b0f');bg.addColorStop(1,'#100d0a');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  const pool=ctx.createLinearGradient(pocketX-W*0.18,0,pocketX+W*0.18,0);
  pool.addColorStop(0,'rgba(255,176,32,0)');pool.addColorStop(.5,'rgba(255,176,32,0.08)');pool.addColorStop(1,'rgba(255,176,32,0)');
  ctx.fillStyle=pool;ctx.fillRect(0,hwTop,W,hwBot-hwTop);

  const X=t=>pocketX+(t-now)*SPEED;
  const ns=notesIn(now,beatDur);

  // beat lines (both bands)
  const sB=Math.floor(now/beatDur)-1, eB=Math.ceil((now+LOOKAHEAD)/beatDur)+1;
  for(let b=sB;b<=eB;b++){const x=X(b*beatDur);if(x<-4||x>W+4)continue;const down=(((b%4)+4)%4===0);
    ctx.strokeStyle=down?'rgba(255,90,61,0.45)':'rgba(120,130,150,0.14)';ctx.lineWidth=(down?2:1)*DPR;
    ctx.beginPath();ctx.moveTo(x,notTop);ctx.lineTo(x,hwBot);ctx.stroke();
    if(down){ctx.fillStyle='rgba(255,90,61,0.6)';ctx.font=`700 ${10*DPR}px ui-monospace,monospace`;ctx.textAlign='center';
      ctx.fillText(((((b/4)%4)+4)%4+1)+'',x,notTop-2*DPR);}
  }

  // staff line
  ctx.strokeStyle='rgba(180,175,160,0.35)';ctx.lineWidth=1.4*DPR;
  ctx.beginPath();ctx.moveTo(0,staffY);ctx.lineTo(W,staffY);ctx.stroke();

  // auto-lock notes at the pocket
  for(const n of ns){ if(!hits.has(n.id)&&n.time<=now){
    const err=(rng(n.id)-0.5)*0.06,r=ratingFor(Math.abs(err));
    hits.set(n.id,{err,t:nowMs,auto:true});
    if(nowMs-lastRating.t>110)lastRating={txt:r.txt,col:r.col,t:nowMs};
    combo=Math.abs(err)<0.14?combo+1:0; bursts.push({x:pocketX,y:hwMid,t:nowMs,col:r.col});
  }}

  // notation band (chalkboard) — noteheads, stems, beams, held notes
  const nhrx=6.5*DPR,nhry=5*DPR,stem=20*DPR;
  // beams: connect consecutive short notes within the same beat
  for(let i=0;i<ns.length-1;i++){const a=ns[i],b2=ns[i+1];
    if(a.dur<=beatDur*0.6 && b2.dur<=beatDur*0.6 && Math.floor(a.beat)===Math.floor(b2.beat) && (b2.time-a.time)<=beatDur*0.6){
      const xa=X(a.time),xb=X(b2.time);if(xb<-10||xa>W+10)continue;
      ctx.strokeStyle='rgba(220,214,198,0.8)';ctx.lineWidth=3*DPR;
      ctx.beginPath();ctx.moveTo(xa+nhrx,staffY-stem);ctx.lineTo(xb+nhrx,staffY-stem);ctx.stroke();
      if(a.dur<=beatDur*0.3&&b2.dur<=beatDur*0.3){ctx.beginPath();ctx.moveTo(xa+nhrx,staffY-stem+5*DPR);ctx.lineTo(xb+nhrx,staffY-stem+5*DPR);ctx.stroke();}
    }
  }
  for(const n of ns){const x=X(n.time);if(x<-20||x>W+20)continue;
    const held=n.dur>=beatDur*1.5;
    if(held){const tw=(n.dur*SPEED)-nhrx;ctx.strokeStyle='rgba(220,214,198,0.5)';ctx.lineWidth=2*DPR;
      ctx.beginPath();ctx.moveTo(x+nhrx,staffY);ctx.lineTo(x+nhrx+Math.max(0,tw),staffY);ctx.stroke();}
    ctx.save();ctx.translate(x,staffY);ctx.rotate(-0.3);
    ctx.fillStyle=held?'#0a0b0f':'#ece6d6';ctx.strokeStyle='#ece6d6';ctx.lineWidth=1.8*DPR;
    ctx.beginPath();ctx.ellipse(0,0,nhrx,nhry,0,0,7);ctx.fill();if(held)ctx.stroke();ctx.restore();
    ctx.strokeStyle='rgba(220,214,198,0.85)';ctx.lineWidth=1.6*DPR;
    ctx.beginPath();ctx.moveTo(x+nhrx,staffY);ctx.lineTo(x+nhrx,staffY-stem);ctx.stroke();
  }

  // highway gems + tails
  for(const n of ns){const x=X(n.time);if(x<-50||x>W+50)continue;
    const hit=hits.get(n.id),isHold=n.dur>beatDur*0.9,rad=13*DPR;
    if(isHold){const tw=n.dur*SPEED;const tg=ctx.createLinearGradient(x,0,x+tw,0);
      tg.addColorStop(0,'rgba(255,176,32,0.34)');tg.addColorStop(1,'rgba(255,176,32,0.05)');
      ctx.fillStyle=tg;rrect(x,hwMid-7*DPR,tw,14*DPR,7*DPR);ctx.fill();}
    const down=(Math.round(n.beat)%4===0&&Math.abs(n.beat-Math.round(n.beat))<0.01);
    let base=down?'#ff7a4d':'#ffd07a',edge=down?'#ff5a3d':'#ffb020';
    if(hit){const r=ratingFor(Math.abs(hit.err));base=r.col;edge=r.col;}
    ctx.save();ctx.shadowColor=edge;ctx.shadowBlur=(hit?22:13)*DPR;
    const gg=ctx.createRadialGradient(x-rad*0.3,hwMid-rad*0.3,1,x,hwMid,rad);
    gg.addColorStop(0,'#fff7e6');gg.addColorStop(0.55,base);gg.addColorStop(1,edge);
    ctx.fillStyle=gg;ctx.beginPath();ctx.arc(x,hwMid,rad,0,7);ctx.fill();ctx.restore();
    ctx.strokeStyle='rgba(20,16,10,0.5)';ctx.lineWidth=1*DPR;ctx.beginPath();ctx.arc(x,hwMid,rad,0,7);ctx.stroke();
  }

  // the pocket — vertical lock-bar through both bands (signature)
  const phase=(now/beatDur)%1, pulse=0.6+0.4*Math.max(0,1-phase*3);
  ctx.fillStyle='rgba(255,176,32,0.06)';ctx.fillRect(pocketX-14*DPR,notTop,28*DPR,hwBot-notTop);
  ctx.save();ctx.shadowColor='#ffb020';ctx.shadowBlur=22*DPR*pulse;
  ctx.strokeStyle=`rgba(255,176,32,${0.55+0.45*pulse})`;ctx.lineWidth=3*DPR;
  ctx.beginPath();ctx.moveTo(pocketX,notTop);ctx.lineTo(pocketX,hwBot);ctx.stroke();ctx.restore();
  ctx.fillStyle='#ffb020';[notTop,hwBot].forEach(y=>{ctx.beginPath();ctx.arc(pocketX,y,3.5*DPR,0,7);ctx.fill();});
  ctx.fillStyle='rgba(255,176,32,0.45)';ctx.font=`700 ${10*DPR}px ui-monospace,monospace`;ctx.textAlign='center';
  ctx.fillText('THE POCKET',pocketX,hwBot+14*DPR<H?hwBot+14*DPR:hwBot-6*DPR);

  // bursts + popup
  bursts=bursts.filter(b=>nowMs-b.t<360);
  for(const b of bursts){const a=(nowMs-b.t)/360,r=(8+a*44)*DPR;
    ctx.strokeStyle=`rgba(${hex2rgb(b.col)},${(1-a)*0.8})`;ctx.lineWidth=2.5*DPR*(1-a);
    ctx.beginPath();ctx.arc(b.x,b.y,r,0,7);ctx.stroke();}
  if(nowMs-lastRating.t<480){const a=1-(nowMs-lastRating.t)/480;
    ctx.fillStyle=`rgba(${hex2rgb(lastRating.col)},${a})`;ctx.font=`800 ${18*DPR}px ui-monospace,monospace`;ctx.textAlign='center';
    ctx.fillText(lastRating.txt,pocketX,hwTop-6*DPR-(1-a)*8*DPR);}

  document.getElementById('combo').textContent=combo;
  document.getElementById('combo').style.color=combo>=8?'#ffb020':'#ece6d6';
  const lb=document.getElementById('last');lb.textContent=lastRating.txt;lb.style.color=lastRating.col;

  if(hits.size>500)hits.clear();
  requestAnimationFrame(frame);
}
size();requestAnimationFrame(frame);
</script>
</body>
</html>
